---
# service.yml — enable and start the Loki instance, then wait for readiness.

- name: Enable and start loki@{{ loki_instance_name }}.service
  ansible.builtin.systemd:
    name: "loki@{{ loki_instance_name }}.service"
    state: started
    enabled: true
    scope: user
    daemon_reload: true

- name: Wait for Loki readiness (plain HTTP to localhost)
  # Direct HTTP call to Loki — do NOT use the Traefik HTTPS endpoint here.
  # Traefik is not assumed to be running in all environments (e.g. CI).
  ansible.builtin.uri:
    url: "http://localhost:{{ loki_http_port }}/ready"
    method: GET
    status_code: 200
  register: _loki_ready
  retries: 15
  delay: 2
  until: _loki_ready.status == 200
  failed_when: _loki_ready.status != 200
