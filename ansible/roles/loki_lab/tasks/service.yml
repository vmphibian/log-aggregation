---
# service.yml — enable and start the Loki instance, then wait for readiness.

- name: "Enable and start Loki service: {{ loki_instance_name }}"
  ansible.builtin.systemd:
    name: "loki@{{ loki_instance_name }}.service"
    state: started
    enabled: true
    scope: user
    daemon_reload: true

- name: Wait for Loki readiness (internal check)
  ansible.builtin.command:
    cmd: >
      podman exec loki-{{ loki_instance_name }}
      wget -qO- http://localhost:3100/ready
  register: _loki_ready
  retries: 15
  delay: 3
  until: _loki_ready.rc == 0
