---
# volume.yml — provision the named Podman volume Quadlet unit.
# The volume unit file name MUST be loki-{{ loki_instance_name }}.volume —
# Quadlet derives the Podman volume name from this filename.
# The per-instance container unit references it as
# Volume=loki-{{ loki_instance_name }}.volume, which Quadlet resolves at
# generator time to create the automatic systemd ordering dependency
# (loki-{{ loki_instance_name }}-volume.service).

- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/containers/systemd"
    state: directory
    mode: "0750"

- name: Render volume Quadlet unit for instance {{ loki_instance_name }}
  ansible.builtin.template:
    src: loki.volume.j2
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/loki-{{ loki_instance_name }}.volume"
    mode: "0640"
  notify: Systemd daemon-reload (user)
