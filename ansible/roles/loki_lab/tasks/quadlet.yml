---
# quadlet.yml — render a per-instance Quadlet container unit.
# One file per instance avoids Quadlet's inability to resolve the systemd %i
# specifier in Volume= lines at generator time. Multi-instance deployments
# render additional files with distinct names (loki-<instance>.container).

- name: Ensure Quadlet directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/containers/systemd"
    state: directory
    mode: "0750"

- name: "Render Quadlet container unit for instance: {{ loki_instance_name }}"
  ansible.builtin.template:
    src: loki.container.j2
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/loki-{{ loki_instance_name }}.container"
    mode: "0640"
  # changed_when is driven by the template diff (default template module behaviour).
  # A second instance deployment will not report changed if the file is identical.
  notify: "loki daemon-reload"
