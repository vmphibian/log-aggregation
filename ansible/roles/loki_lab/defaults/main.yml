---
# loki_lab role defaults
# All variables here can be overridden in the playbook or inventory.

# ── Instance name ─────────────────────────────────────────────────────────────
# Unique identifier for this Loki instance on the target host.
# Pattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$  (e.g. "lab-42")
# Falls back to lab_instance_name if set at the playbook level.
loki_instance_name: "{{ lab_instance_name | default('') }}"

# ── Storage ───────────────────────────────────────────────────────────────────
# Which storage backend to use for log data.
# "local"  — a standard Podman-managed volume (no extra setup).
# "s3"     — an s3fs-fuse bind-mount via the .volume Quadlet unit.
#            Requires loki_s3_mount_path to point to a live s3fs mount.
loki_storage_backend: "local"

# ── Networking ────────────────────────────────────────────────────────────────
# Whether to publish Loki's HTTP and gRPC ports on the host loopback.
# Disabled by default: Traefik reaches Loki over the container network, so
# host ports are not required. Set to true if co-located tooling (e.g.
# Grafana Alloy, readiness probes run on the host) needs direct access via
# 127.0.0.1. When false, loki_http_port and loki_grpc_port have no effect
# on the rendered Quadlet unit.
loki_publish_ports: false

# Host port Loki's HTTP listener is bound to (localhost only).
# Only applied when loki_publish_ports is true.
# Traefik communicates with Loki on this port over plain HTTP — no TLS.
loki_http_port: 3100

# Host port for Loki's gRPC listener (localhost only).
# Only applied when loki_publish_ports is true.
# Grafana Alloy push target when Alloy runs on the same host.
loki_grpc_port: 9095

# ── Retention ─────────────────────────────────────────────────────────────────
# How long logs are retained before the Loki compactor deletes them.
# Golang duration string format (e.g. "168h" = 7 days, "24h" = 1 day).
loki_retention_period: "168h"

# ── Image ─────────────────────────────────────────────────────────────────────
# Fully-qualified image reference. Never use "latest" — pin to a specific
# version so deployments are reproducible and upgrades are explicit.
# Pinned version: 3.5.0 (2025-01). Update this line and README.md together.
loki_image: "docker.io/grafana/loki:3.5.0"

# ── Config directory ──────────────────────────────────────────────────────────
# Base directory on the host where rendered Loki configs are stored.
# Instance config: {{ loki_config_dir_base }}/{{ loki_instance_name }}/loki.yaml
loki_config_dir_base: "{{ ansible_user_dir }}/.config/loki"

# ── Traefik integration ───────────────────────────────────────────────────────
# Domain used to build the per-instance subdomain routing rule:
#   Host(`<instance>.loki.<domain>`)
# REQUIRED — no default is provided. Supply via playbook vars, inventory, or
# extra-vars. The preflight stage asserts this is set and non-empty.
# Example: loki_traefik_domain: "lab.internal"
# loki_traefik_domain: ""

# Traefik entrypoint name. Must match the TLS entrypoint in your Traefik config.
# Falls back to lab_traefik_entrypoint if set at the playbook level.
loki_traefik_entrypoint: "{{ lab_traefik_entrypoint | default('websecure') }}"

# ── Testing escape hatch ──────────────────────────────────────────────────────
# Keep strict non-root behavior by default. This can be enabled only in
# containerized CI tests (e.g. Molecule) where the instance user is root.
loki_allow_root_for_testing: false
