---
name: Test

on:  # yamllint disable-line rule:truthy
  pull_request:
  workflow_dispatch:

jobs:
  molecule:
    name: molecule
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-molecule-${{ hashFiles('**/requirements*.txt') }}-${{ runner.os }}
          restore-keys: pip-test-molecule-

      - name: Cache ansible-galaxy collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: galaxy-${{ hashFiles('molecule/default/requirements.yml') }}-${{ runner.os }}
          restore-keys: galaxy-

      - name: Install Python dependencies
        run: |
          pip install molecule molecule-podman molecule-plugins ansible-core ansible-lint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install containers.podman
          ansible-galaxy collection install -r molecule/default/requirements.yml

      - name: Configure rootless Podman environment
        run: |
          # Verify Podman is available
          podman info
          # Set XDG_RUNTIME_DIR for the runner user (required for rootless Podman)
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}" >> "${GITHUB_ENV}"
          # Enable lingering so user systemd units persist across login sessions
          # Required for systemctl --user to function on the runner
          loginctl enable-linger "$(id -un)" || true
          # Brief wait for linger to take effect
          sleep 2
          systemctl --user status || true

      - name: Run Molecule test suite
        run: molecule test -s default
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "True"

  integration:
    name: integration
    runs-on: ubuntu-latest
    # Runs in parallel with molecule — no dependency declared intentionally.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Podman
        run: podman --version

      - name: Configure rootless systemd environment
        run: |
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}" >> "${GITHUB_ENV}"
          loginctl enable-linger "$(id -un)" || true
          sleep 2
          systemctl --user status || true

      - name: Run deploy.sh
        env:
          LOKI_INSTANCE_NAME: ci-test
          LOKI_STORAGE_BACKEND: local
          LOKI_HTTP_PORT: "3100"
          LOKI_GRPC_PORT: "9095"
          LOKI_RETENTION_PERIOD: 1h
          LOKI_TRAEFIK_DOMAIN: ci.internal
          LOKI_IMAGE: docker.io/grafana/loki:3.5.0
        run: bash scripts/deploy.sh

      - name: Assert Loki is ready (plain HTTP to localhost)
        run: |
          curl -sf http://localhost:3100/ready
          echo "Loki /ready returned 200 OK"

      - name: Push a test log entry
        run: |
          NOW_NS=$(date +%s%N)
          curl -sf -X POST http://localhost:3100/loki/api/v1/push \
            -H 'Content-Type: application/json' \
            -d "{\"streams\":[{\"stream\":{\"job\":\"ci-integration\",\"instance\":\"ci-test\"},\"values\":[[\"${NOW_NS}\",\"Integration test log entry\"]]}]}"
          echo "Log push returned 204"
          echo "PUSH_TS=${NOW_NS}" >> "${GITHUB_ENV}"

      - name: Query pushed log entry via query_range
        # nanosecond epoch timestamps — required by Loki query_range API
        run: |
          START_NS=$(( PUSH_TS - 60000000000 ))
          END_NS=$(( PUSH_TS + 60000000000 ))
          RESULT=$(curl -sf "http://localhost:3100/loki/api/v1/query_range" \
            --get \
            --data-urlencode 'query={job="ci-integration",instance="ci-test"}' \
            --data-urlencode "start=${START_NS}" \
            --data-urlencode "end=${END_NS}" \
            --data-urlencode "limit=10")
          echo "${RESULT}" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          results = d['data']['result']
          assert len(results) > 0, 'No streams returned'
          assert len(results[0]['values']) > 0, 'No entries returned'
          print('Query returned', len(results[0]['values']), 'entries — OK')
          "

      - name: Run export-logs.sh
        env:
          LOKI_INSTANCE_NAME: ci-test
          LOKI_HTTP_PORT: "3100"
          LOKI_RETENTION_PERIOD: 1h
        run: |
          bash scripts/export-logs.sh
          EXPORT_FILE=$(ls loki-export-ci-test-*.ndjson | head -1)
          [[ -s "${EXPORT_FILE}" ]] || { echo "Export file is empty: ${EXPORT_FILE}"; exit 1; }
          echo "Export file non-empty: ${EXPORT_FILE} ($(wc -l < "${EXPORT_FILE}") lines)"

      - name: Teardown
        if: always()
        env:
          LOKI_INSTANCE_NAME: ci-test
        run: |
          systemctl --user stop "loki@ci-test.service" || true
          podman volume rm "loki-ci-test" || true
          rm -rf "${HOME}/.config/loki/ci-test" || true
          echo "Teardown complete."
