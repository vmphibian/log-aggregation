---
name: Lint

on:  # yamllint disable-line rule:truthy
  push:
  pull_request:

jobs:
  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('**/requirements*.txt') }}-${{ runner.os }}
          restore-keys: pip-lint-

      - name: Cache ansible-galaxy collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: galaxy-${{ hashFiles('molecule/default/requirements.yml') }}-${{ runner.os }}
          restore-keys: galaxy-

      - name: Install ansible-lint and dependencies
        run: |
          pip install ansible-lint ansible-core
          ansible-galaxy collection install containers.podman

      - name: Run ansible-lint
        run: ansible-lint ansible/

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on deploy.sh
        run: shellcheck --severity=warning --shell=bash scripts/deploy.sh

      - name: Run shellcheck on export-logs.sh
        run: shellcheck --severity=warning --shell=bash scripts/export-logs.sh

  quadlet-syntax:
    name: quadlet-syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Podman version
        run: podman --version

      - name: Validate Quadlet unit syntax
        # /usr/libexec/podman/quadlet is the systemd generator binary.
        # It reads from XDG_CONFIG_HOME/containers/systemd/ (Podman 4.x+).
        # We set XDG_CONFIG_HOME explicitly so the generator finds the unit on
        # all runner configurations, then run -dryrun to validate without
        # writing output files.
        #
        # The repository ships quadlet/loki.container.tpl as an envsubst
        # template (concrete per-instance files are rendered by deploy.sh or
        # the Ansible role). Here we render it with representative sample
        # values and syntax-check the result.
        #
        # Informational messages like "Error occurred resolving path" for
        # missing system dirs are expected and benign — we ignore them by
        # checking the generator exit code only, not grepping stderr text.
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base
          export XDG_CONFIG_HOME="/tmp/quadlet-xdg"
          mkdir -p "${XDG_CONFIG_HOME}/containers/systemd"
          export LOKI_INSTANCE_NAME="ci-syntax"
          export LOKI_IMAGE="docker.io/grafana/loki:3.5.0"
          export LOKI_CONFIG_DIR_BASE="/tmp/loki-config"
          export LOKI_TRAEFIK_DOMAIN="example.internal"
          export LOKI_TRAEFIK_ENTRYPOINT="websecure"
          export LOKI_PUBLISHPORT_HTTP_LINE=""
          export LOKI_PUBLISHPORT_GRPC_LINE=""
          envsubst < quadlet/loki.container.tpl \
            > "${XDG_CONFIG_HOME}/containers/systemd/loki-${LOKI_INSTANCE_NAME}.container"
          /usr/libexec/podman/quadlet -dryrun
          echo "Quadlet syntax OK."

  yaml-lint:
    name: yaml-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint .
