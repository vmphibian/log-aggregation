---
name: Publish to Ansible Galaxy

on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  sync:
    name: Sync role to Galaxy target repo
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push role subdirectory to ansible-role-loki_lab
        env:
          GALAXY_SYNC_TOKEN: ${{ secrets.GALAXY_SYNC_TOKEN }}
        run: |
          git clone \
            "https://x-access-token:${GALAXY_SYNC_TOKEN}@github.com/vmphibian/ansible-role-loki_lab.git" \
            /tmp/galaxy-target

          rsync -av --delete \
            --exclude='.git' \
            ansible/roles/loki_lab/ /tmp/galaxy-target/

          cd /tmp/galaxy-target
          git add -A
          git diff --staged --quiet && echo "No changes to sync." && exit 0
          git commit -m "Sync loki_lab ${GITHUB_REF_NAME} from log-aggregation"
          git push
