---
# verify.yml — Assert correctness of the deployed Loki instance.
#
# All API calls run inside the Loki container via podman exec. Loki ports are
# not published to the host — external access is via Traefik only. Traefik is
# not present in the Molecule environment, so container-internal HTTP is used.

- name: Verify
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Wait for Loki readiness (internal check)
      ansible.builtin.command:
        cmd: >
          podman exec loki-{{ loki_instance_name }}
          wget -qO- http://localhost:3100/ready
      register: _loki_ready
      retries: 15
      delay: 3
      until: _loki_ready.rc == 0
      changed_when: false

    - name: Assert Loki container is running
      ansible.builtin.command:
        cmd: podman ps --format "{{ '{{' }}.Names{{ '}}' }}"
      register: _podman_ps
      changed_when: false

    - name: Verify container named loki-molecule-test exists
      ansible.builtin.assert:
        that:
          - "'loki-molecule-test' in _podman_ps.stdout"
        fail_msg: "Container 'loki-molecule-test' not found in podman ps output."

    - name: Inspect container for Traefik labels
      ansible.builtin.command:
        cmd: podman inspect loki-molecule-test --format json
      register: _inspect
      changed_when: false

    - name: Parse container inspect output
      ansible.builtin.set_fact:
        _labels: "{{ (_inspect.stdout | from_json)[0]['Config']['Labels'] }}"

    - name: Assert traefik.enable=true label is present
      ansible.builtin.assert:
        that:
          - "_labels['traefik.enable'] == 'true'"
        fail_msg: "Label traefik.enable=true not found on container."

    - name: Assert Traefik router rule label is correct
      ansible.builtin.assert:
        that:
          - "_labels['traefik.http.routers.loki-molecule-test.rule'] == \"Host(`molecule-test.loki.test.internal`)\""
        fail_msg: "Traefik router rule label is incorrect or missing."

    - name: Assert Traefik entrypoints=websecure label is present
      ansible.builtin.assert:
        that:
          - "_labels['traefik.http.routers.loki-molecule-test.entrypoints'] == 'websecure'"
        fail_msg: "Traefik entrypoints label is incorrect or missing."

    - name: Assert Traefik tls=true label is present
      ansible.builtin.assert:
        that:
          - "_labels['traefik.http.routers.loki-molecule-test.tls'] == 'true'"
        fail_msg: "Traefik tls label is incorrect or missing."

    - name: Assert Traefik loadbalancer port label is correct
      ansible.builtin.assert:
        that:
          - "_labels['traefik.http.services.loki-molecule-test.loadbalancer.server.port'] == '3100'"
        fail_msg: "Traefik loadbalancer port label is incorrect or missing."

    - name: Push a test log entry (container-internal HTTP via podman exec)
      ansible.builtin.command:
        cmd: >
          podman exec loki-{{ loki_instance_name }}
          wget -qO- --post-data
          '{"streams":[{"stream":{"job":"molecule-verify","instance":"molecule-test"},"values":[["{{ (ansible_date_time.epoch | int * 1000000000) | string }}","Molecule verification test log entry"]]}]}'
          --header 'Content-Type: application/json'
          http://localhost:3100/loki/api/v1/push
      register: _push
      changed_when: false
      failed_when: _push.rc != 0

    - name: Wait briefly for log ingestion
      ansible.builtin.pause:
        seconds: 3

    - name: Query log entry via query_range (container-internal HTTP via podman exec)
      ansible.builtin.command:
        cmd: >
          podman exec loki-{{ loki_instance_name }}
          wget -qO- 'http://localhost:3100/loki/api/v1/query_range?query=%7Bjob%3D%22molecule-verify%22%2Cinstance%3D%22molecule-test%22%7D&start={{ ((ansible_date_time.epoch | int - 60) * 1000000000) | string }}&end={{ ((ansible_date_time.epoch | int + 60) * 1000000000) | string }}&limit=10'
      register: _query
      changed_when: false
      failed_when: _query.rc != 0

    - name: Assert queried log entry is returned
      ansible.builtin.assert:
        that:
          - (_query.stdout | from_json).data.result | length > 0
          - (_query.stdout | from_json).data.result[0]['values'] | length > 0
        fail_msg: "Pushed log entry was not returned by query_range."
