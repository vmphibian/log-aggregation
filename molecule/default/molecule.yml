---
# Molecule scenario using localhost execution via Molecule's default driver.
#
# This role manages rootless Podman and user-systemd on the host running tests.
# In GitHub Actions, Podman is available on the ubuntu-latest runner, but not
# inside the ephemeral Molecule test container image.
#
# CI Notes (GitHub Actions ubuntu-latest, Podman 4.9.3):
#   - The runner user must have lingering enabled; the test.yml workflow does
#     this with: loginctl enable-linger $USER
#   - XDG_RUNTIME_DIR must be set for rootless Podman.

dependency:
  name: galaxy
  options:
    requirements-file: molecule/default/requirements.yml

driver:
  # Use Molecule's built-in local driver behavior for localhost scenarios.
  # This avoids external delegated driver plugin resolution issues in CI.
  name: default

platforms:
  - name: localhost
    managed: false
    address: localhost
    connection: local

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/ansible/roles
  config_options:
    defaults:
      interpreter_python: auto_silent

verifier:
  name: ansible
